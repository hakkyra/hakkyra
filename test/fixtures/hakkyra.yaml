# Hakkyra test server configuration

server:
  port: 0        # 0 = auto-assign (for parallel test runs)
  host: 127.0.0.1

auth:
  jwt:
    type: HS256
    key: test-secret-key-minimum-32-chars!!
    claims_namespace: https://hasura.io/jwt/claims
    audience: hakkyra-test
    issuer: hakkyra-test-suite
  admin_secret_from_env: HAKKYRA_ADMIN_SECRET
  unauthorized_role: anonymous

webhook:
  allow_private_urls: true

databases:
  primary:
    url_from_env: DATABASE_URL
    pool:
      max: 5
      idle_timeout: 30
      connection_timeout: 5
  read_your_writes:
    enabled: true
    window_seconds: 2

rest:
  auto_generate: true
  base_path: /api/v1
  pagination:
    default_limit: 20
    max_limit: 100
  overrides:
    client:
      - method: GET
        path: /clients
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /clients/:id
        operation: select_by_pk
      - method: POST
        path: /clients
        operation: insert_one
    invoice:
      - method: GET
        path: /invoices
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /invoices/:id
        operation: select_by_pk
    account:
      - method: GET
        path: /accounts
        operation: select
    product:
      - method: GET
        path: /products
        operation: select
        default_order: name:asc

docs:
  generate: true
  llm_format: true
