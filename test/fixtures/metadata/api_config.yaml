# Hakkyra extension: API configuration

table_aliases:
  client_data: clientData
  service_plan_client: servicePlanClient
  client_service: clientService
  client_summary: clientSummary
  plan_item: planItem
  ledger_entry: ledgerEntry
  service_plan: servicePlan

rest:
  auto_generate: true
  base_path: /api/v1
  pagination:
    default_limit: 20
    max_limit: 100
  overrides:
    client:
      - method: GET
        path: /clients
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /clients/:id
        operation: select_by_pk
      - method: POST
        path: /clients
        operation: insert_one
    invoice:
      - method: GET
        path: /invoices
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /invoices/:id
        operation: select_by_pk
    account:
      - method: GET
        path: /accounts
        operation: select
    product:
      - method: GET
        path: /products
        operation: select
        default_order: name:asc

docs:
  generate: true
  llm_format: true
  include_examples: true
