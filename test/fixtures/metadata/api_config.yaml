# Hakkyra extension: API configuration

custom_queries:
  - name: getClientWithBalance
    type: query
    sql: |
      SELECT
        c.id,
        c.username,
        c.email,
        c.status,
        COALESCE(SUM(a.balance), 0)::numeric as total_balance,
        COALESCE(SUM(a.credit_balance), 0)::numeric as total_credit
      FROM client c
      LEFT JOIN account a ON a.client_id = c.id AND a.active = true
      WHERE c.id = $1
      GROUP BY c.id
    params:
      - name: clientId
        type: uuid
    returns: ClientWithBalance
    permissions:
      - role: backoffice
      - role: administrator
      - role: function
        filter:
          id:
            _eq: X-Hasura-Client-Id

  - name: getTopClients
    type: query
    sql: |
      SELECT
        cs.client_id as id,
        cs.username,
        cs.total_balance,
        cs.total_payments,
        cs.payment_count,
        cs.total_appointments
      FROM client_summary cs
      WHERE cs.branch_id = $1
      ORDER BY cs.total_payments DESC
      LIMIT $2
    params:
      - name: branchId
        type: uuid
      - name: limit
        type: int
    returns: TopClient
    permissions:
      - role: backoffice
      - role: administrator

  - name: creditAccount
    type: mutation
    sql: |
      UPDATE account
      SET balance = balance + $2, updated_at = now()
      WHERE id = $1 AND active = true
      RETURNING id, client_id, balance, credit_balance
    params:
      - name: accountId
        type: uuid
      - name: amount
        type: numeric
    returns: AccountBalance
    permissions:
      - role: function
      - role: administrator

rest:
  auto_generate: true
  base_path: /api/v1
  pagination:
    default_limit: 20
    max_limit: 100
  overrides:
    client:
      - method: GET
        path: /clients
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /clients/:id
        operation: select_by_pk
      - method: POST
        path: /clients
        operation: insert_one
    invoice:
      - method: GET
        path: /invoices
        operation: select
        default_order: created_at:desc
      - method: GET
        path: /invoices/:id
        operation: select_by_pk
    account:
      - method: GET
        path: /accounts
        operation: select
    product:
      - method: GET
        path: /products
        operation: select
        default_order: name:asc

docs:
  generate: true
  llm_format: true
  include_examples: true
