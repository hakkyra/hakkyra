# ── Action: createPayment ──────────────────────────────────────────────────────
type Mutation {
  createPayment(input: CreatePaymentInput!): PaymentResult
}

input CreatePaymentInput {
  amount: Float!
  currencyId: String!
  provider: String
  returnUrl: String
}

type PaymentResult {
  invoiceId: uuid!
  redirectUrl: String
  status: String!
}

# ── Action: adjustAccount ──────────────────────────────────────────────────────
extend type Mutation {
  adjustAccount(input: AdjustAccountInput!): AdjustAccountResult
}

input AdjustAccountInput {
  clientId: uuid!
  amount: Float!
  currencyId: String!
  reason: String!
  type: String!
}

type AdjustAccountResult {
  ledgerEntryId: uuid!
  clientId: uuid!
  newBalance: Float!
  success: Boolean!
}

# ── Action: requestVerification ────────────────────────────────────────────────
extend type Mutation {
  requestVerification(input: RequestVerificationInput!): VerificationRequestResult
}

input RequestVerificationInput {
  documentType: String!
  documentCountry: String!
}

type VerificationRequestResult {
  requestId: uuid!
  status: String!
  verificationUrl: String
}

# ── Action: checkDiscountEligibility ───────────────────────────────────────────
type Query {
  checkDiscountEligibility(input: CheckDiscountEligibilityInput!): DiscountEligibilityResult
}

input CheckDiscountEligibilityInput {
  servicePlanId: uuid!
  clientId: uuid
}

type DiscountEligibilityResult {
  eligible: Boolean!
  reason: String
  planName: String!
  discountType: String
  discountValue: JSON
}

# ── Action: scheduleConsultation ───────────────────────────────────────────────
extend type Mutation {
  scheduleConsultation(input: ScheduleConsultationInput!): ScheduleConsultationResult
}

input ScheduleConsultationInput {
  productCode: String!
  mode: String
  returnUrl: String
}

type ScheduleConsultationResult {
  appointmentId: uuid!
  confirmationUrl: String!
  reference: String!
  expiresAt: Timestamptz
}

# ── Action: processService ─────────────────────────────────────────────────────
extend type Mutation {
  processService(input: ProcessServiceInput!): ProcessServiceResult
}

input ProcessServiceInput {
  clientServiceId: uuid!
  action: String!
}

type ProcessServiceResult {
  success: Boolean!
  newStatus: String!
  amountApplied: Float
}

# ── Action: updateLimit (inline args, no input wrapper) ───────────────────────
extend type Mutation {
  updateLimit(
    type: String!
    amount: Float
    endTime: String
  ): UpdateLimitResult
}

type UpdateLimitResult {
  ok: Boolean!
}

# ── Action: acceptContractWithToken (ID scalar + numeric types) ───────────────
extend type Mutation {
  acceptContractWithToken(input: AcceptContractInput!): AcceptContractResult
}

input AcceptContractInput {
  contractId: ID!
  token: String!
  depositAmount: numeric
}

type AcceptContractResult {
  id: ID!
  contractRef: ID
  totalAmount: numeric!
  balanceDue: Numeric
  walletId: Uuid!
  accepted: Boolean!
}

# ── Action: contentEvent (scalar type parity: enum, _text, Bigint, Jsonb, etc.) ─
scalar _text

enum ContentCategory {
  NEWS
  BLOG
  EVENT
  ANNOUNCEMENT
}

extend type Mutation {
  contentEvent(input: ContentEventInput!): ContentEventResult
}

input ContentEventInput {
  playerId: Bigint!
  parameters: Jsonb
  tags: _text
  category: ContentCategory!
  occurredAt: Timestamptz
  amount: Numeric
}

type ContentEventResult {
  eventId: Uuid!
  category: ContentCategory!
  processedTags: _text
  metadata: Jsonb
  success: Boolean!
}
