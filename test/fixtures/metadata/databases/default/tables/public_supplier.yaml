table:
  schema: public
  name: supplier

array_relationships:
  - name: products
    using:
      foreign_key_constraint_on:
        column: supplier_id
        table:
          schema: public
          name: product

select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - name
        - code
      filter:
        active:
          _eq: true

  - role: client
    permission:
      columns:
        - id
        - name
        - code
      filter:
        active:
          _eq: true

  - role: backoffice
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

  - role: administrator
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

insert_permissions:
  - role: administrator
    permission:
      columns:
        - name
        - code
        - active
        - tags
        - ratings
      check: {}

update_permissions:
  - role: administrator
    permission:
      columns:
        - name
        - active
        - tags
        - ratings
      filter: {}
