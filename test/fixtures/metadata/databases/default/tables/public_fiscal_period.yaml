table:
  schema: public
  name: fiscal_period

configuration:
  custom_root_fields:
    select: fiscalPeriods
    select_by_pk: fiscalPeriodByPk
  custom_column_names:
    year: year
    quarter: quarter
    name: name

array_relationships:
  - name: reports
    using:
      foreign_key_constraint_on:
        columns:
          - fiscal_year
          - fiscal_quarter
        table:
          schema: public
          name: fiscal_report

select_permissions:
  - role: backoffice
    permission:
      columns: "*"
      filter: {}

  - role: administrator
    permission:
      columns: "*"
      filter: {}
