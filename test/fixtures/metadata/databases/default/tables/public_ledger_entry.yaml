table:
  schema: public
  name: ledger_entry

configuration:
  custom_column_names:
    invoice_id: invoiceId
    client_id: clientId
    account_id: accountId
    balance_before: balanceBefore
    balance_after: balanceAfter
    created_at: createdAt

object_relationships:
  - name: invoice
    using:
      foreign_key_constraint_on: invoice_id
  - name: client
    using:
      foreign_key_constraint_on: client_id
  - name: account
    using:
      foreign_key_constraint_on: account_id

select_permissions:
  - role: client
    permission:
      columns:
        - id
        - type
        - amount
        - balance_before
        - balance_after
        - created_at
      filter:
        client_id:
          _eq: X-Hasura-User-Id
      limit: 100

  - role: backoffice
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

  - role: function
    permission:
      columns: "*"
      filter:
        client_id:
          _eq: X-Hasura-Client-Id

  - role: administrator
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

insert_permissions:
  - role: function
    permission:
      columns:
        - invoice_id
        - client_id
        - account_id
        - type
        - amount
        - balance_before
        - balance_after
      check: {}
    backend_only: true
