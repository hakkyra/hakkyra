table:
  schema: public
  name: appointment

configuration:
  custom_root_fields:
    select: appointments
    select_by_pk: appointmentByPk
    select_aggregate: appointmentsAggregate
    insert: insertAppointments
    insert_one: insertAppointment
    update: updateAppointments
    update_by_pk: updateAppointmentByPk
    delete: deleteAppointments
    delete_by_pk: deleteAppointmentByPk
  custom_column_names:
    id: id
    client_id: clientId
    product_id: productId
    branch_id: branchId
    currency_id: currencyId
    priority: priority
    notes: notes
    active: active
    discount_rate: discountRate
    created_at: createdAt
    updated_at: updatedAt
  comment: "Appointment with full custom root fields and camelCase columns"

object_relationships:
  - name: client
    using:
      foreign_key_constraint_on: client_id
  - name: product
    using:
      foreign_key_constraint_on: product_id
  - name: branch
    using:
      foreign_key_constraint_on: branch_id
  - name: currency
    using:
      foreign_key_constraint_on: currency_id

select_permissions:
  - role: client
    permission:
      columns:
        - id
        - product_id
        - active
        - created_at
        - updated_at
      filter:
        client_id:
          _eq: X-Hasura-User-Id
      limit: 50

  - role: backoffice
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

  - role: function
    permission:
      columns: "*"
      filter:
        client_id:
          _eq: X-Hasura-Client-Id

  - role: administrator
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

insert_permissions:
  - role: function
    permission:
      columns:
        - client_id
        - product_id
        - branch_id
        - currency_id
        - notes
        - discount_rate
      check:
        _and:
          - client:
              status:
                _eq: active
          - client:
              on_hold:
                _eq: false
          - product:
              active:
                _eq: true
      set:
        active: "true"
    backend_only: true

update_permissions:
  - role: function
    permission:
      columns:
        - active
        - updated_at
      filter:
        client_id:
          _eq: X-Hasura-Client-Id

  - role: administrator
    permission:
      columns: "*"
      filter: {}
