table:
  schema: public
  name: branch

array_relationships:
  - name: clients
    using:
      foreign_key_constraint_on:
        column: branch_id
        table:
          schema: public
          name: client
  - name: servicePlans
    using:
      foreign_key_constraint_on:
        column: branch_id
        table:
          schema: public
          name: service_plan
  - name: appointments
    using:
      foreign_key_constraint_on:
        column: branch_id
        table:
          schema: public
          name: appointment

select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - name
        - code
      filter:
        active:
          _eq: true
  - role: client
    permission:
      columns:
        - id
        - name
        - code
      filter:
        active:
          _eq: true
  - role: backoffice
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: administrator
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true

insert_permissions:
  - role: administrator
    permission:
      columns:
        - name
        - code
        - active
      check: {}

update_permissions:
  - role: administrator
    permission:
      columns:
        - name
        - active
      filter: {}
