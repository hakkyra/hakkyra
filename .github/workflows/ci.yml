name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hakkyra_test
          POSTGRES_USER: hakkyra
          POSTGRES_PASSWORD: hakkyra_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U hakkyra -d hakkyra_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://hakkyra:hakkyra_test@localhost:5433/hakkyra_test
      HAKKYRA_ADMIN_SECRET: test-admin-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: psql "$DATABASE_URL" -f test/fixtures/init.sql
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
